<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción Próspera IA</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.rit.js" async=""></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "218759be-3cc1-4a68-9374-8265ebf61cc1",
          safari_web_id: "web.onesignal.auto.10425338-761c-4384-8176-787201b3b248",
          // SOLUCIÓN AL ERROR 404: Ruta forzada a la subcarpeta
          serviceWorkerPath: "prospera-web/OneSignalSDKWorker.js",
          serviceWorkerParam: { scope: "/prospera-web/" },
          allowLocalhostAsSecureOrigin: true,
          notifyButton: {
            enable: true, /* Esto activa la campana roja */
            position: 'bottom-right',
            size: 'medium',
            text: {
                'tip.state.unsubscribed': 'Suscríbete a las alertas',
                'tip.state.subscribed': 'Estás suscrito',
                'tip.state.blocked': 'Has bloqueado las notificaciones'
            },
            colors: {
                'circle.background': 'red'
            }
          },
        });

        // Intentar lanzar la petición de permiso al cargar
        OneSignal.Notifications.requestPermission();
      });
    </script>
</head>
